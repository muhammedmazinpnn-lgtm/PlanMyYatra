<!DOCTYPE html>
<html>
<head>
    <title>Goa Trip - PlanMyYatra</title>
</head>
<body>

<h1>Goa Trip Planner</h1>

<label>Days:</label>
<input type="number" id="days"><br><br>

<label>Budget:</label>
<input type="number" id="budget"><br><br>

<button onclick="generate()">Generate Plan</button>

<div id="result"></div>

<script>
function generate() {
    let days = document.getElementById("days").value;
    let result = document.getElementById("result");

    if(days == 3){
        result.innerHTML = `
        <h3>3-Day Goa Plan</h3>
        Day 1: Beach + Hotel<br>
        Day 2: Water Sports + Fort<br>
        Day 3: Shopping + Return
        `;
    } else {
        result.innerHTML = "Basic Goa trip plan available.";
    }
}
</script>

</body>
</html>
