<!DOCTYPE html>
<html lang="en">
<head>
    <title>PlanMyYatra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HERO SECTION -->
    <header class="hero">
        <h1>PlanMyYatra</h1>
        <p>Your Journey, Perfectly Planned</p>
        <button onclick="scrollToDest()">Start Planning</button>
    </header>

    <!-- INTRO SECTION -->
    <section class="intro">
        <h2>Explore India Smartly</h2>
        <p>
            Plan your trips across India with customized itineraries based on your budget,
            time, and travel style. Choose your destination, set your preferences,
            and let us build your perfect journey.
        </p>
    </section>

    <!-- DESTINATIONS -->
    <section class="destinations" id="destinations">

        <div class="card" onclick="goTo('goa.html')">
            <img src="https://source.unsplash.com/400x300/?goa,beach">
            <h3>Goa</h3>
        </div>

        <div class="card" onclick="goTo('manali.html')">
            <img src="https://source.unsplash.com/400x300/?manali,mountains">
            <h3>Manali</h3>
        </div>

        <div class="card" onclick="goTo('jaipur.html')">
            <img src="https://source.unsplash.com/400x300/?jaipur,fort">
            <h3>Jaipur</h3>
        </div>

    </section>

    <script>
        function goTo(page) {
            window.location.href = page;
        }

        function scrollToDest() {
            document.getElementById("destinations").scrollIntoView({
                behavior: "smooth"
            });
        }
    </script>

</body>
</html>
