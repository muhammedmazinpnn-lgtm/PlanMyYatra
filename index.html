<!DOCTYPE html>
<html lang="en">
<head>
    <title>PlanMyYatra</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
    <h2>PlanMyYatra</h2>

    <div class="nav-right">
        <button>Explore</button>
    </div>
</nav>
<!-- HEADER -->
 
    <header class="header">
        <h2 class="logo">PlanMyYatra</h2>
    </header>

    <!-- HERO -->
   <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>
            Plan Your Journey Across India
        </h1>

        <p>
            Create personalized travel plans based on your budget, time, and preferences.
            Explore destinations, build itineraries, and travel smarter.
        </p>

        <div class="buttons">
            <button onclick="scrollToDest()">Start Planning</button>
            <button class="secondary">Explore Destinations</button>
        </div>
    </div>
</section>

    <!-- DESTINATIONS -->
    <section class="destinations" id="destinations">
        <h2>Popular Destinations</h2>

        <div class="card-container">

            <div class="card" onclick="goTo('goa.html')">
    <img src="images/goa img.jpg">
    <div class="card-text">Goa</div>
</div>

<div class="card" onclick="goTo('manali.html')">
    <img src="images/manali img.jpg">
    <div class="card-text">Manali</div>
</div>

<div class="card" onclick="goTo('jaipur.html')">
    <img src="images/jaipur img.jpg">
    <div class="card-text">Jaipur</div>
</div>
        </div>
    </section>

    <script>
        function goTo(page) {
            window.location.href = page;
        }

        function scrollToDest() {
            document.getElementById("destinations").scrollIntoView({
                behavior: "smooth"
            });
        }
    </script>

</body>
</html>
