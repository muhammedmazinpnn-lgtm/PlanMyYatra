<!DOCTYPE html>
<html lang="en">
<head>
    <title>PlanMyYatra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h2>PlanMyYatra</h2>
        <button onclick="scrollToDest()">Explore</button>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>Design Your Perfect Journey</h1>
            <p>Smart trip planning across India with personalized itineraries and budgets.</p>
            <button onclick="scrollToDest()">Start Planning</button>
        </div>
    </section>

    <!-- DESTINATIONS -->
    <section class="destinations" id="destinations">
        <h2>Popular Destinations</h2>

        <div class="card-container">

            <div class="card" onclick="goTo('goa.html')">
                <img src="https://source.unsplash.com/400x300/?goa,beach">
                <div class="card-text">Goa</div>
            </div>

            <div class="card" onclick="goTo('manali.html')">
                <img src="https://source.unsplash.com/400x300/?manali,mountains">
                <div class="card-text">Manali</div>
            </div>

            <div class="card" onclick="goTo('jaipur.html')">
                <img src="https://source.unsplash.com/400x300/?jaipur,fort">
                <div class="card-text">Jaipur</div>
            </div>

        </div>
    </section>

    <script>
        function goTo(page) {
            window.location.href = page;
        }

        function scrollToDest() {
            document.getElementById("destinations").scrollIntoView({
                behavior: "smooth"
            });
        }
    </script>

</body>
</html>
