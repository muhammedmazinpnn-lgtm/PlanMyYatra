<!DOCTYPE html>
<html lang="en">
<head>
    <title>PlanMyYatra</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h2 class="logo">PlanMyYatra</h2>
    </header>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-content">
            <h1>Plan Your Journey Across India</h1>

            <p>
                Create personalized travel plans based on your budget, time, and preferences.
                Explore destinations, build itineraries, and travel smarter.
            </p>

            <div class="buttons">
                <button onclick="scrollToDest()">Start Planning</button>
                <button class="secondary" onclick="scrollToDest()">Explore Destinations</button>
            </div>
        </div>

    </section>

    <!-- DESTINATIONS -->
    <section class="destinations" id="destinations">
        <h2>Popular Destinations</h2>

        <div class="card-container">

            <!-- GOA -->
            <div class="card" onclick="goTo('goa.html')">
                <div class="card-image">
                    <img src="images/goa img.jpg">
                    <div class="overlay"></div>
                    <div class="card-title">Goa</div>
                </div>
            </div>

            <!-- MANALI -->
            <div class="card" onclick="goTo('manali.html')">
                <div class="card-image">
                    <img src="images/manali img.jpg">
                    <div class="overlay"></div>
                    <div class="card-title">Manali</div>
                </div>
            </div>

            <!-- JAIPUR -->
            <div class="card" onclick="goTo('jaipur.html')">
                <div class="card-image">
                    <img src="images/jaipur img.jpg">
                    <div class="overlay"></div>
                    <div class="card-title">Jaipur</div>
                </div>
            </div>

            <!-- KASHMIR -->
            <div class="card" onclick="goTo('kashmir.html')">
                <div class="card-image">
                    <img src="images/kashmir img.jpg">
                    <div class="overlay"></div>
                    <div class="card-title">Kashmir</div>
                </div>
            </div>

        </div>
    </section>

    <script>
        function goTo(page) {
            window.location.href = page;
        }

        function scrollToDest() {
            document.getElementById("destinations").scrollIntoView({
                behavior: "smooth"
            });
        }
    </script>

</body>
</html>
